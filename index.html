<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Task Manager</title>
  <!-- Google Font & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>📋Task Manager/Todo-List</h1>
      <button id="darkModeBtn" aria-pressed="false">
        <i class="fa-solid fa-moon" aria-hidden="true"></i>
        <span>Dark mode</span>
      </button>
    </header>

    <!-- Search -->
    <div class="search-section">
      <label for="searchInput">Search tasks</label>
      <input type="search" id="searchInput" placeholder="Search tasks... (e.g. 'work')">
    </div>

    <!-- Add/Edit task form -->
    <div class="input-section" role="group" aria-label="Task form">
      <input type="text" id="taskInput" placeholder="Task name" aria-label="Task name">
      <input type="time" id="startTime" aria-label="Start time">
      <input type="time" id="endTime" aria-label="End time">
      <select id="categorySelect" aria-label="Category">
        <option value="Study">Study</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
      </select>
      <select id="prioritySelect" aria-label="Priority">
        <option value="High">High</option>
        <option value="Medium" selected>Medium</option>
        <option value="Low">Low</option>
      </select>
      <div class="button-group">
        <button id="addTaskBtn" aria-label="Add task">
          <i class="fa-solid fa-plus" aria-hidden="true"></i> Add
        </button>
        <button id="cancelEditBtn" class="cancel-btn" aria-label="Cancel edit" style="display: none;">
          <i class="fa-solid fa-times" aria-hidden="true"></i> Cancel
        </button>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-section">
      <div class="progress-label">
        <span id="progressText">0% completed</span>
        <span>Overall progress</span>
      </div>
      <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
        aria-labelledby="progressText">
        <div id="progressFill"></div>
      </div>
    </div>

    <!-- Task table -->
    <div class="table-wrapper" tabindex="0" aria-label="Task list">
      <table>
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Task</th>
            <th scope="col">Time</th>
            <th scope="col">Category</th>
            <th scope="col">Priority</th>
            <th scope="col">Done</th>
            <th scope="col">Edit</th>
            <th scope="col">Delete</th>
          </tr>
        </thead>
        <tbody id="taskTable"></tbody>
      </table>
    </div>

    <!-- Live region for screen readers -->
    <div class="sr-only" aria-live="polite" id="liveRegion"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
