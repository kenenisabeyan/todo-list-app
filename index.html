<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Task Manager</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

  <div class="container">

    <header>

      <h1>Task Manager</h1>

      <button id="darkModeBtn">
        <i class="fa-solid fa-moon"></i>
      </button>

    </header>


    <!-- SEARCH -->

    <input id="searchInput" placeholder="Search tasks">


    <!-- FILTERS -->

    <div class="filters">

      <select id="filterPriority">
        <option value="">Priority</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <select id="filterCategory">
        <option value="">Category</option>
        <option>Study</option>
        <option>Work</option>
        <option>Personal</option>
      </select>

      <select id="filterStatus">
        <option value="">Status</option>
        <option>To Do</option>
        <option>In Progress</option>
        <option>Done</option>
      </select>

    </div>


    <!-- ADD TASK -->

    <div class="input-section">

      <input id="taskInput" placeholder="Task name">

      <input type="datetime-local" id="dueDate">

      <select id="categorySelect">
        <option>Study</option>
        <option>Work</option>
        <option>Personal</option>
      </select>

      <select id="prioritySelect">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <button id="addTaskBtn">
        <i class="fa-solid fa-plus"></i>
      </button>

    </div>


    <!-- DASHBOARD -->

    <div class="dashboard">

      <div class="card">
        <h3>Total</h3>
        <p id="totalTasks">0</p>
      </div>

      <div class="card">
        <h3>Completed</h3>
        <p id="doneTasks">0</p>
      </div>

      <div class="card">
        <h3>Progress</h3>
        <p id="progressPercent">0%</p>
      </div>

    </div>


    <!-- KANBAN BOARD -->

    <div class="board">

      <div class="column" data-status="To Do">

        <h3>To Do</h3>

        <div class="taskList" id="todoList"></div>

      </div>

      <div class="column" data-status="In Progress">

        <h3>In Progress</h3>

        <div class="taskList" id="progressList"></div>

      </div>

      <div class="column" data-status="Done">

        <h3>Done</h3>

        <div class="taskList" id="doneList"></div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
