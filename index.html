<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Task Manager</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

  <div class="container">

    <header>

      <h1>Task Manager</h1>

      <button id="darkModeBtn">
        <i class="fa-solid fa-moon"></i>
      </button>

    </header>

    <!-- SEARCH -->

    <input id="searchInput" placeholder="Search tasks...">


    <!-- FILTERS -->

    <div class="filters">

      <select id="filterPriority">
        <option value="">Priority</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <select id="filterCategory">
        <option value="">Category</option>
        <option>Study</option>
        <option>Work</option>
        <option>Personal</option>
      </select>

      <select id="filterDone">
        <option value="">Done</option>
        <option>true">Completed</option>
        <option>false">Pending</option>
      </select>

    </div>


    <!-- ADD TASK -->

    <div class="input-section">

      <input id="taskInput" placeholder="Enter task">

      <input type="datetime-local" id="dueDate">

      <select id="categorySelect">
        <option>Study</option>
        <option>Work</option>
        <option>Personal</option>
      </select>

      <select id="prioritySelect">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <button id="addTaskBtn">
        <i class="fa-solid fa-plus"></i> Add
      </button>

    </div>


    <!-- ANALYTICS -->

    <div class="analytics">

      <div class="card">
        Total: <span id="totalTasks">0</span>
      </div>

      <div class="card">
        Completed: <span id="doneTasks">0</span>
      </div>

      <div class="card">
        Progress: <span id="progressPercent">0%</span>
      </div>

    </div>


    <!-- TABLE -->

    <table>

      <thead>

        <tr>
          <th>#</th>
          <th>Task</th>
          <th>Due</th>
          <th>Category</th>
          <th>Priority</th>
          <th>Done</th>
          <th>Edit</th>
          <th>Exit</th>
        </tr>

      </thead>

      <tbody id="taskTable"></tbody>

    </table>

  </div>

  <script src="script.js"></script>

</body>

</html>
