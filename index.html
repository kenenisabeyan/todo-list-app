<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Task Manager</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

  <div class="container">

    <header>
      <h1>Task Manager</h1>
      <button id="darkBtn"><i class="fa-solid fa-moon"></i></button>
    </header>


    <!-- SEARCH -->

    <input id="search" placeholder="Search task...">


    <!-- FILTERS -->

    <div class="filters">

      <select id="filterPriority">
        <option value="">Priority</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <select id="filterCategory">
        <option value="">Category</option>
        <option>Study</option>
        <option>Work</option>
        <option>Personal</option>
      </select>

      <select id="filterStatus">
        <option value="">Status</option>
        <option value="true">Completed</option>
        <option value="false">Pending</option>
      </select>

    </div>


    <!-- ADD TASK -->

    <div class="task-input">

      <input id="taskName" placeholder="Enter task">

      <input type="datetime-local" id="taskDate">

      <select id="taskCategory">
        <option>Study</option>
        <option>Work</option>
        <option>Personal</option>
      </select>

      <select id="taskPriority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <button id="addBtn">
        <i class="fa-solid fa-plus"></i> Add
      </button>

    </div>


    <!-- DASHBOARD -->

    <div class="dashboard">

      <div class="card">
        Total <span id="total">0</span>
      </div>

      <div class="card">
        Done <span id="done">0</span>
      </div>

      <div class="card">
        Progress <span id="progress">0%</span>
      </div>

    </div>


    <!-- TABLE -->

    <table>

      <thead>

        <tr>
          <th>#</th>
          <th>Task</th>
          <th>Due</th>
          <th>Category</th>
          <th>Priority</th>
          <th>Done</th>
          <th>Edit</th>
          <th>Exit</th>
        </tr>

      </thead>

      <tbody id="taskTable"></tbody>

    </table>

  </div>

  <script src="script.js"></script>

</body>

</html>
